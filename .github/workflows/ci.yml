name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Run regressions
        run: ./tests/run_major_regressions.sh

      - name: Install library
        run: |
          rm -rf install
          cmake --install build --prefix install

      - name: Build consumer example
        run: |
          rm -rf examples/consumer/build
          cmake -S examples/consumer -B examples/consumer/build \
            -DCMAKE_PREFIX_PATH="$PWD/install"
          cmake --build examples/consumer/build

      - name: Run consumer example
        run: ./examples/consumer/build/consumer
